# ============================================================
# LoadTrack – Production Configuration
# All values come from environment variables set in Render
# ============================================================

# Server
server.port=${PORT:8080}

# Database (Railway MySQL)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE:loadtrack}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS - allow frontend URL
app.cors.allowed-origins=${FRONTEND_URL}

# File Storage
app.receipt.storage.path=receipts/

# OpenRouter AI
openrouter.api.key=${OPENROUTER_KEY}
openrouter.model=nvidia/nemotron-nano-9b-v2:free
