# ============================================================
# LoadTrack – Application Configuration
# ============================================================

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/loadtrack?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=gdrspk
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=LoadTrack2024SecretKeyForJWTTokenGenerationMustBe256BitsLong
jwt.expiration=86400000

# File Storage (PDF receipts)
app.receipt.storage.path=receipts/

# CORS
app.cors.allowed-origins=http://localhost:4200

# OpenRouter AI (free models)
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.model=nvidia/nemotron-nano-9b-v2:free
